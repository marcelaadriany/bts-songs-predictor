
spring.application.name=bts-songs-predictor

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bts_songs_predictor}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

api.security.token.secret=${JWT_SECRET:dev-secret-change-me-please-123456789}